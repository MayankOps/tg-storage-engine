<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Storage Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-gradient"></div>
  
  <main class="main-container">
    <div class="container">
      <!-- Header Section -->
      <div class="header">
        <div class="icon-wrapper">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" x2="9"></line>
            <line x1="9" y1="15" x2="15" x2="15"></line>
          </svg>
        </div>
        <h1>TG Storage Engine</h1>
        <p class="subtitle">Fast and reliable cloud storage</p>
      </div>

      <!-- Upload Section -->
      <div class="upload-section">
        <div class="file-input-wrapper">
          <input type="file" id="fileInput" class="file-input" accept="*">
          <label for="fileInput" class="file-input-label">
            <div class="upload-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <span class="file-label-text">Choose or drag file here</span>
            <span class="file-label-subtext">or click to select</span>
          </label>
          <div class="file-name-display" id="fileName"></div>
        </div>

        <button onclick="upload()" class="upload-btn" id="uploadBtn">
          <span class="btn-text">Upload File</span>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          </svg>
        </button>
      </div>

      <!-- Progress Section -->
      <div class="progress-section" id="progressSection" style="display: none;">
        <div class="progress-bar-wrapper">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText">Uploading...</p>
      </div>

      <!-- Result Section -->
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="success-message" id="successMessage"></div>
        <div class="link-card" id="linkCard">
          <span class="link-label">Your Download Link:</span>
          <input type="text" id="downloadLink" class="link-input" readonly>
          <button onclick="copyToClipboard()" class="copy-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
            Copy Link
          </button>
          <a id="downloadButton" class="download-btn" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            Download
          </a>
        </div>
        <button onclick="resetForm()" class="reset-btn">Upload Another</button>
      </div>

      <!-- Error Section -->
      <div class="error-message" id="errorMessage" style="display: none;"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
